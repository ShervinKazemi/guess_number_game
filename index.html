<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guess Number Game</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Geist:ital,wght@0,100..900;1,100..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="parent">
        <header class="header">
            <div class="header__text">
                <h1 class="heading-1">GuessLogic</h1>
                <p class="paragraph">First to guess the secret number wins.</p>
            </div>
            <a href="#" class="reset btn btn--dark">
                <img src="assets/ic_reload.svg" alt="Reload Icon">
                <span class="btn__text">Restart</span>
            </a>
        </header>
        <div class="secret-number">
            <h5 class="heading-5">Secret Number</h5>
            <span class="number secret-number__number">?</span>
        </div>
        <div class="player player--0 player--active">
            <div class="player__profile">
                <div class="player__logo-box">
                    <img class="player__logo" src="assets/ic_person.svg" alt="">
                </div>
                <span class="player__name">
                    Player 1
                </span>
                <div class="player__score player__score--0">0</div>
            </div>
            <div class="player__playing">
                <span class="player__state player__state--0">
                    Start Guessing...
                </span>
                <div class="form">
                    <input type="text" class="form__input input--0" placeholder="e.g. 10">
                    <button href="#" class="check btn btn--light">Guess</button>
                </div>
            </div>
            <div class="player__waiting">
                <img src="assets/ic_time.svg" alt="Icon Time">
                <h5 class="heading-5">Waiting for player 2</h5>
            </div>
            <div class="player__status">
                <p class="player__total">
                    Total Score: <span class="player__total-score total-score--0">
                        0
                    </span>
                </p>
                <span class="player__turn">
                    Your Turn
                </span>
            </div>
        </div>
        <div class="player player--1">
            <div class="player__profile">
                <div class="player__logo-box">
                    <img class="player__logo" src="assets/ic_person.svg" alt="">
                </div>
                <span class="player__name">
                    Player 2
                </span>
                <div class="player__score player__score--1">0</div>
            </div>
            <div class="player__playing">
                <span class="player__state player__state--1">
                    Start Guessing...
                </span>
                <div class="form">
                    <input type="text" class="form__input input--1" placeholder="e.g. 10">
                    <button href="#" class="check btn btn--light">Guess</button>
                </div>
            </div>
            <div class="player__waiting">
                <img src="assets/ic_time.svg" alt="Icon Time">
                <h5 class="heading-5">Waiting for player 2</h5>
            </div>
            <div class="player__status">
                <p class="player__total">
                    Total Score: <span class="player__total-score total-score--1">
                        0
                    </span>
                </p>
                <span class="player__turn">
                    Your Turn
                </span>
            </div>
        </div>
    </div>

    <script src="script.js" defer></script>

</body>

</html>
